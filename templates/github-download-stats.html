<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Release Download Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/relativeTime.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0a15 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .subtitle {
            color: rgba(224, 224, 224, 0.6);
            font-size: 1.1em;
            margin-bottom: 25px;
        }

        .input-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 700px;
            margin: 0 auto;
        }

        input {
            flex: 1;
            min-width: 200px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #e0e0e0;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: rgba(224, 224, 224, 0.4);
        }

        button {
            padding: 16px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            color: #667eea;
        }

        .error {
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .error::before {
            content: '⚠';
            font-size: 24px;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.4);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card h3 {
            font-size: 0.75em;
            color: rgba(224, 224, 224, 0.6);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 2.2em;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .charts-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 35px;
            margin-bottom: 50px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.04);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .chart-container h2 {
            margin-bottom: 25px;
            color: #e0e0e0;
            font-size: 1.6em;
            font-weight: 700;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 35px;
        }

        .releases-section h2 {
            margin-bottom: 30px;
            color: #e0e0e0;
            font-size: 2em;
            font-weight: 700;
        }

        .releases-list {
            display: grid;
            gap: 25px;
        }

        .release-card {
            background: rgba(255, 255, 255, 0.04);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .release-card:hover {
            transform: translateY(-3px);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.25);
        }

        .release-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .release-info {
            flex: 1;
        }

        .release-title {
            font-size: 1.5em;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .release-date {
            color: rgba(224, 224, 224, 0.5);
            font-size: 0.95em;
        }

        .release-tag {
            padding: 8px 16px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            border-radius: 8px;
            color: #667eea;
            font-size: 0.9em;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .release-stats {
            display: flex;
            gap: 25px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .release-stat {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 15px 20px;
            background: rgba(102, 126, 234, 0.08);
            border-radius: 10px;
            border: 1px solid rgba(102, 126, 234, 0.15);
        }

        .release-stat-label {
            font-size: 0.8em;
            color: rgba(224, 224, 224, 0.6);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .release-stat-value {
            font-size: 2em;
            font-weight: 800;
            color: #667eea;
        }

        .release-age {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 6px;
            font-size: 0.85em;
            color: rgba(224, 224, 224, 0.7);
            margin-left: 10px;
        }

        .release-notes {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .release-notes-toggle {
            cursor: pointer;
            color: #667eea;
            font-size: 0.9em;
            font-weight: 600;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .release-notes-toggle:hover {
            color: #764ba2;
        }

        .release-notes-content {
            margin-top: 10px;
            color: rgba(224, 224, 224, 0.8);
            font-size: 0.95em;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }

        .release-notes-content h1,
        .release-notes-content h2,
        .release-notes-content h3 {
            color: #e0e0e0;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .release-notes-content h1 { font-size: 1.5em; }
        .release-notes-content h2 { font-size: 1.3em; }
        .release-notes-content h3 { font-size: 1.1em; }

        .release-notes-content p {
            margin-bottom: 10px;
        }

        .release-notes-content ul,
        .release-notes-content ol {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .release-notes-content li {
            margin-bottom: 5px;
        }

        .release-notes-content code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .release-notes-content pre {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 10px;
        }

        .release-notes-content pre code {
            background: none;
            padding: 0;
        }

        .release-notes-content a {
            color: #667eea;
            text-decoration: none;
        }

        .release-notes-content a:hover {
            text-decoration: underline;
        }

        .release-notes-content blockquote {
            border-left: 3px solid rgba(102, 126, 234, 0.5);
            padding-left: 15px;
            margin: 10px 0;
            color: rgba(224, 224, 224, 0.7);
        }

        .release-notes-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }

        .release-notes-content table {
            border-collapse: collapse;
            margin: 10px 0;
            width: 100%;
        }

        .release-notes-content th,
        .release-notes-content td {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px;
            text-align: left;
        }

        .release-notes-content th {
            background: rgba(255, 255, 255, 0.05);
        }

        .contributors-section {
            margin-bottom: 50px;
        }

        .contributors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .contributor-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            cursor: pointer;
        }

        .contributor-card:hover {
            transform: translateY(-2px);
            border-color: rgba(102, 126, 234, 0.4);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .contributor-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .contributor-info {
            flex: 1;
        }

        .contributor-name {
            font-weight: 600;
            color: #e0e0e0;
            font-size: 0.95em;
        }

        .contributor-commits {
            font-size: 0.85em;
            color: rgba(224, 224, 224, 0.6);
        }

        .assets-list {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .assets-title {
            font-size: 0.9em;
            color: rgba(224, 224, 224, 0.6);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: all 0.2s ease;
            flex-wrap: wrap;
            gap: 15px;
            text-decoration: none;
            cursor: pointer;
        }

        .asset-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateX(5px);
        }

        .asset-item::after {
            content: '⬇';
            font-size: 18px;
            color: rgba(102, 126, 234, 0.6);
            transition: all 0.2s ease;
        }

        .asset-item:hover::after {
            color: rgba(102, 126, 234, 1);
            transform: translateY(2px);
        }

        .asset-name {
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            flex: 1;
        }

        .asset-size {
            color: rgba(224, 224, 224, 0.5);
            font-size: 0.85em;
        }

        .asset-downloads {
            color: #667eea;
            font-weight: 700;
            font-size: 1.1em;
        }

        canvas {
            max-height: 450px;
        }

        /* Skeleton loading styles */
        .skeleton {
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.03) 0%,
                rgba(255, 255, 255, 0.08) 50%,
                rgba(255, 255, 255, 0.03) 100%
            );
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s ease-in-out infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-stat-card {
            height: 120px;
        }

        .skeleton-contributor {
            height: 70px;
        }

        .skeleton-chart {
            height: 400px;
        }

        .skeleton-release {
            height: 200px;
            margin-bottom: 25px;
        }

        .skeleton-text {
            height: 20px;
            margin-bottom: 10px;
        }

        .skeleton-text.short {
            width: 60%;
        }

        @media (max-width: 1024px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .input-section {
                flex-direction: column;
            }

            input, button {
                width: 100%;
            }

            .stats-overview {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GitHub Release Download Stats</h1>
            <p class="subtitle">Visualize and analyze download statistics for GitHub releases</p>
            <div class="input-section">
                <input type="text" id="ownerInput" placeholder="Repository Owner">
                <input type="text" id="repoInput" placeholder="Repository Name">
                <button id="fetchBtn" onclick="fetchStats()">Load Stats</button>
            </div>
        </header>

        <div id="errorContainer"></div>
        <div id="loadingContainer"></div>
        <div id="statsContainer"></div>
    </div>

    <script>
        // Wait for all libraries to load
        let charts = {};
        let currentAbortController = null;
        let librariesLoaded = false;

        function initializeLibraries() {
            if (librariesLoaded) return;

            // Configure marked for security
            if (typeof marked !== 'undefined') {
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    headerIds: false,
                    mangle: false
                });
            }

            // Configure day.js with relative time plugin
            if (typeof dayjs !== 'undefined' && typeof dayjs_plugin_relativeTime !== 'undefined') {
                dayjs.extend(dayjs_plugin_relativeTime);
            }

            librariesLoaded = true;
        }

        // Initialize when DOM is ready and libraries are loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeLibraries);
        } else {
            initializeLibraries();
        }

        // Show skeleton loaders
        function showSkeletons() {
            const statsContainer = document.getElementById('statsContainer');
            statsContainer.innerHTML = `
                <div class="stats-overview">
                    ${Array(4).fill('<div class="stat-card skeleton skeleton-stat-card"></div>').join('')}
                </div>
                <div class="charts-section">
                    <div class="chart-container">
                        <h2>Downloads per Release</h2>
                        <div class="skeleton skeleton-chart"></div>
                    </div>
                    <div class="chart-grid">
                        <div class="chart-container">
                            <h2>Timeline</h2>
                            <div class="skeleton skeleton-chart"></div>
                        </div>
                        <div class="chart-container">
                            <h2>Top 10 Assets (Cumulative)</h2>
                            <div class="skeleton skeleton-chart"></div>
                        </div>
                    </div>
                </div>
                <div class="releases-section">
                    <h2>All Releases</h2>
                    <div class="releases-list">
                        ${Array(5).fill('<div class="skeleton skeleton-release"></div>').join('')}
                    </div>
                </div>
            `;
        }

        async function fetchStats() {
            // Ensure libraries are loaded
            initializeLibraries();

            const owner = document.getElementById('ownerInput').value.trim();
            const repo = document.getElementById('repoInput').value.trim();

            if (!owner || !repo) {
                showError('Please enter both repository owner and name');
                return;
            }

            // Check if required libraries are loaded
            if (typeof marked === 'undefined' || typeof dayjs === 'undefined') {
                showError('Libraries are still loading. Please wait a moment and try again.');
                return;
            }

            // Cancel previous request if any
            if (currentAbortController) {
                currentAbortController.abort();
            }
            currentAbortController = new AbortController();

            const errorContainer = document.getElementById('errorContainer');
            const loadingContainer = document.getElementById('loadingContainer');
            const fetchBtn = document.getElementById('fetchBtn');

            try {
                errorContainer.innerHTML = '';
                loadingContainer.innerHTML = '';
                fetchBtn.disabled = true;

                // Destroy existing charts
                Object.values(charts).forEach(chart => {
                    try {
                        chart?.destroy();
                    } catch (e) {
                        console.error('Error destroying chart:', e);
                    }
                });
                charts = {};

                // Show skeletons immediately
                showSkeletons();

                // Fetch all data in parallel
                const [releasesResponse, repoResponse] = await Promise.allSettled([
                    fetch(`https://api.github.com/repos/${owner}/${repo}/releases`, {
                        signal: currentAbortController.signal
                    }),
                    fetch(`https://api.github.com/repos/${owner}/${repo}`, {
                        signal: currentAbortController.signal
                    })
                ]);

                // Handle releases
                let releases = [];
                if (releasesResponse.status === 'fulfilled' && releasesResponse.value.ok) {
                    try {
                        releases = await releasesResponse.value.json();
                    } catch (e) {
                        throw new Error('Failed to parse releases data');
                    }
                } else if (releasesResponse.status === 'fulfilled') {
                    const response = releasesResponse.value;
                    if (response.status === 404) {
                        throw new Error('Repository not found. Please check the owner and repository name.');
                    } else if (response.status === 403) {
                        throw new Error('API rate limit exceeded. Please try again later.');
                    }
                    throw new Error(`Failed to fetch releases: ${response.status} ${response.statusText}`);
                } else {
                    throw new Error('Failed to fetch releases: Network error');
                }

                if (!releases || releases.length === 0) {
                    throw new Error('No releases found for this repository');
                }

                // Handle repo data
                let repoData = null;
                if (repoResponse.status === 'fulfilled' && repoResponse.value.ok) {
                    try {
                        repoData = await repoResponse.value.json();
                    } catch (e) {
                        console.warn('Failed to parse repo data:', e);
                    }
                }

                // Display all data
                displayStats(releases, owner, repo, repoData);

            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Request was cancelled');
                    return;
                }
                showError(error.message);
                document.getElementById('statsContainer').innerHTML = '';
            } finally {
                loadingContainer.innerHTML = '';
                fetchBtn.disabled = false;
                currentAbortController = null;
            }
        }

        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error">${message}</div>`;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function displayStats(releases, owner, repo, repoData) {
            try {
                const statsContainer = document.getElementById('statsContainer');

                // Calculate statistics
                let totalDownloads = 0;
                let totalAssets = 0;
                let totalSize = 0;

                releases.forEach(release => {
                    try {
                        if (release.assets && Array.isArray(release.assets)) {
                            release.assets.forEach(asset => {
                                totalDownloads += asset.download_count || 0;
                                totalSize += asset.size || 0;
                                totalAssets++;
                            });
                        }
                    } catch (e) {
                        console.warn('Error processing release:', release.tag_name, e);
                    }
                });

            // Overview cards
            let overviewHTML = `
                <div class="stats-overview">
                    <div class="stat-card">
                        <h3>Total Releases</h3>
                        <div class="value">${releases.length}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Downloads</h3>
                        <div class="value">${totalDownloads.toLocaleString()}</div>
                    </div>
            `;

            // Add repository stats if available
            if (repoData) {
                overviewHTML += `
                    <div class="stat-card">
                        <h3>Stars</h3>
                        <div class="value">${repoData.stargazers_count.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Forks</h3>
                        <div class="value">${repoData.forks_count.toLocaleString()}</div>
                    </div>
                `;
            }

            overviewHTML += '</div>';

            // Charts section
            const chartsHTML = `
                <div class="charts-section">
                    <div class="chart-container">
                        <h2>Downloads per Release</h2>
                        <canvas id="releaseChart"></canvas>
                    </div>
                    <div class="chart-grid">
                        <div class="chart-container">
                            <h2>Timeline</h2>
                            <canvas id="timelineChart"></canvas>
                        </div>
                        <div class="chart-container">
                            <h2>Top 10 Assets (Cumulative)</h2>
                            <canvas id="assetChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            // Releases list
            let releasesHTML = '<div class="releases-section"><h2>All Releases</h2><div class="releases-list">';
            releases.forEach(release => {
                const releaseDownloads = release.assets.reduce((sum, asset) => sum + asset.download_count, 0);
                const releaseDate = new Date(release.published_at).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                // Calculate release age using day.js
                let ageText = '';
                try {
                    if (typeof dayjs !== 'undefined') {
                        const publishedDate = dayjs(release.published_at);
                        ageText = publishedDate.fromNow();
                    } else {
                        const date = new Date(release.published_at);
                        ageText = date.toLocaleDateString();
                    }
                } catch (e) {
                    console.error('Error calculating age:', e);
                    ageText = new Date(release.published_at).toLocaleDateString();
                }

                let assetsHTML = '';
                if (release.assets.length > 0) {
                    // Find max downloads in this release for relative color scaling
                    const maxDownloads = Math.max(...release.assets.map(a => a.download_count));
                    const minDownloads = Math.min(...release.assets.map(a => a.download_count));
                    const range = maxDownloads - minDownloads || 1; // Avoid division by zero

                    assetsHTML = `
                        <div class="assets-list">
                            <div class="assets-title">Assets (${release.assets.length})</div>
                    `;
                    release.assets.forEach(asset => {
                        // Calculate intensity (0 to 1) based on relative download count
                        const intensity = (asset.download_count - minDownloads) / range;

                        // Color gradient: very dim gray (low) to bright vibrant purple/magenta (high)
                        const hue = 280; // Purple hue
                        const saturation = 10 + (intensity * 90); // 10% to 100%
                        const lightness = 40 + (intensity * 35); // 40% to 75%

                        const downloadColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;

                        assetsHTML += `
                            <a href="${asset.browser_download_url}" class="asset-item" download title="Click to download ${asset.name}">
                                <span class="asset-name">${asset.name}</span>
                                <span class="asset-size">${formatBytes(asset.size)}</span>
                                <span class="asset-downloads" style="color: ${downloadColor};">${asset.download_count.toLocaleString()} downloads</span>
                            </a>
                        `;
                    });
                    assetsHTML += '</div>';
                }

                // Release notes
                let notesHTML = '';
                if (release.body && release.body.trim()) {
                    const notesId = `notes-${release.id}`;
                    let renderedMarkdown;
                    try {
                        renderedMarkdown = typeof marked !== 'undefined'
                            ? marked.parse(release.body)
                            : release.body.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
                    } catch (e) {
                        console.error('Error rendering markdown:', e);
                        renderedMarkdown = release.body.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
                    }
                    notesHTML = `
                        <div class="release-notes">
                            <div class="release-notes-toggle" onclick="toggleNotes('${notesId}')">
                                <span id="${notesId}-toggle">▶</span> Release Notes
                            </div>
                            <div id="${notesId}" class="release-notes-content" style="display: none;">
                                ${renderedMarkdown}
                            </div>
                        </div>
                    `;
                }

                releasesHTML += `
                    <div class="release-card">
                        <div class="release-header">
                            <div class="release-info">
                                <div class="release-title">
                                    ${release.name || release.tag_name}
                                    <span class="release-age">${ageText}</span>
                                </div>
                                <div class="release-date">${releaseDate}</div>
                            </div>
                            <div class="release-tag">${release.tag_name}</div>
                        </div>
                        <div class="release-stats">
                            <div class="release-stat">
                                <span class="release-stat-label">Downloads</span>
                                <span class="release-stat-value">${releaseDownloads.toLocaleString()}</span>
                            </div>
                            <div class="release-stat">
                                <span class="release-stat-label">Assets</span>
                                <span class="release-stat-value">${release.assets.length}</span>
                            </div>
                        </div>
                        ${notesHTML}
                        ${assetsHTML}
                    </div>
                `;
            });
            releasesHTML += '</div></div>';

                statsContainer.innerHTML = overviewHTML + chartsHTML + releasesHTML;

                // Create charts
                createCharts(releases);

            } catch (error) {
                console.error('Error displaying stats:', error);
                showError('Failed to display statistics. Please try again.');
            }
        }

        function toggleNotes(notesId) {
            try {
                const notesContent = document.getElementById(notesId);
                const toggle = document.getElementById(`${notesId}-toggle`);
                if (!notesContent || !toggle) return;

                if (notesContent.style.display === 'none') {
                    notesContent.style.display = 'block';
                    toggle.textContent = '▼';
                } else {
                    notesContent.style.display = 'none';
                    toggle.textContent = '▶';
                }
            } catch (error) {
                console.error('Error toggling notes:', error);
            }
        }

        function createCharts(releases) {
            try {
            // Prepare data for release chart (bar chart)
            const releaseLabels = releases.map(r => r.tag_name).reverse();
            const releaseData = releases.map(r =>
                r.assets.reduce((sum, asset) => sum + asset.download_count, 0)
            ).reverse();

            const releaseCtx = document.getElementById('releaseChart').getContext('2d');
            charts.releaseChart = new Chart(releaseCtx, {
                type: 'bar',
                data: {
                    labels: releaseLabels,
                    datasets: [{
                        label: 'Downloads',
                        data: releaseData,
                        backgroundColor: 'rgba(102, 126, 234, 0.7)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        borderRadius: 10,
                        hoverBackgroundColor: 'rgba(118, 75, 162, 0.8)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.9)',
                            padding: 15,
                            titleColor: '#667eea',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyColor: '#e0e0e0',
                            bodyFont: { size: 13 },
                            borderColor: 'rgba(102, 126, 234, 0.5)',
                            borderWidth: 2,
                            cornerRadius: 8,
                            displayColors: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: '#e0e0e0',
                                font: { size: 12 }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.08)'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#e0e0e0',
                                font: { size: 11 },
                                maxRotation: 45,
                                minRotation: 45
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });

            // Timeline chart (line chart)
            const timelineData = releases.map(r => ({
                x: new Date(r.published_at),
                y: r.assets.reduce((sum, asset) => sum + asset.download_count, 0)
            })).reverse();

            const timelineCtx = document.getElementById('timelineChart').getContext('2d');
            charts.timelineChart = new Chart(timelineCtx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Downloads',
                        data: timelineData,
                        backgroundColor: 'rgba(118, 75, 162, 0.15)',
                        borderColor: 'rgba(118, 75, 162, 1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: 'rgba(118, 75, 162, 1)',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        pointHoverBorderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.9)',
                            padding: 15,
                            titleColor: '#764ba2',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyColor: '#e0e0e0',
                            bodyFont: { size: 13 },
                            borderColor: 'rgba(118, 75, 162, 0.5)',
                            borderWidth: 2,
                            cornerRadius: 8,
                            displayColors: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: '#e0e0e0',
                                font: { size: 12 }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.08)'
                            }
                        },
                        x: {
                            type: 'time',
                            time: {
                                unit: 'month',
                                displayFormats: {
                                    month: 'MMM yyyy'
                                }
                            },
                            ticks: {
                                color: '#e0e0e0',
                                font: { size: 11 }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.08)'
                            }
                        }
                    }
                }
            });

            // Top assets chart (horizontal bar chart) - cumulative by filename
            const assetMap = new Map();
            releases.forEach(release => {
                release.assets.forEach(asset => {
                    if (assetMap.has(asset.name)) {
                        assetMap.set(asset.name, assetMap.get(asset.name) + asset.download_count);
                    } else {
                        assetMap.set(asset.name, asset.download_count);
                    }
                });
            });

            const allAssets = Array.from(assetMap, ([name, downloads]) => ({ name, downloads }));
            allAssets.sort((a, b) => b.downloads - a.downloads);
            const topAssets = allAssets.slice(0, 10);

            const assetCtx = document.getElementById('assetChart').getContext('2d');
            charts.assetChart = new Chart(assetCtx, {
                type: 'bar',
                data: {
                    labels: topAssets.map(a => a.name),
                    datasets: [{
                        label: 'Downloads',
                        data: topAssets.map(a => a.downloads),
                        backgroundColor: 'rgba(240, 147, 251, 0.7)',
                        borderColor: 'rgba(240, 147, 251, 1)',
                        borderWidth: 2,
                        borderRadius: 10,
                        hoverBackgroundColor: 'rgba(240, 147, 251, 0.9)'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.9)',
                            padding: 15,
                            titleColor: '#f093fb',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyColor: '#e0e0e0',
                            bodyFont: { size: 13 },
                            borderColor: 'rgba(240, 147, 251, 0.5)',
                            borderWidth: 2,
                            cornerRadius: 8,
                            displayColors: false
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: {
                                color: '#e0e0e0',
                                font: { size: 12 }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.08)'
                            }
                        },
                        y: {
                            ticks: {
                                color: '#e0e0e0',
                                font: { size: 10 }
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });

            } catch (error) {
                console.error('Error creating charts:', error);
                // Charts will remain as skeletons if there's an error
            }
        }

        // Allow Enter key to trigger search
        document.getElementById('ownerInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchStats();
        });
        document.getElementById('repoInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchStats();
        });

        // Parse URL query parameters and auto-load if provided
        window.addEventListener('DOMContentLoaded', () => {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const owner = urlParams.get('owner');
                const repo = urlParams.get('repo');

                if (owner) {
                    const ownerInput = document.getElementById('ownerInput');
                    if (ownerInput) ownerInput.value = owner;
                }
                if (repo) {
                    const repoInput = document.getElementById('repoInput');
                    if (repoInput) repoInput.value = repo;
                }

                // Auto-load stats if both owner and repo are provided
                if (owner && repo) {
                    fetchStats();
                }
            } catch (error) {
                console.error('Error parsing URL parameters:', error);
            }
        });
    </script>
</body>
</html>
