<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{.Description}}">
    <title>Viktoras Agejevas – {{.Title}}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%23ec4899'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='8' fill='%230a0a0f'/%3E%3Cpath d='M6 10 L15 30 L24 10 L33 30 M19 21 L29 21' fill='none' stroke='url(%23g)' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/styles.css">
    <script>
        document.fonts.ready.then(() => document.body.classList.add('fonts-loaded'));
    </script>
</head>
<body>
    <div id="intro-screen">
        <nav class="tab-nav">
            <a href="/" class="tab-btn{{if eq .Active "about"}} active{{end}}">About</a>
            <a href="/projects" class="tab-btn{{if eq .Active "projects"}} active{{end}}">Projects</a>
            <a href="/music" class="tab-btn{{if eq .Active "music"}} active{{end}}">Music</a>
            <a href="/writing" class="tab-btn{{if eq .Active "writing"}} active{{end}}">Writing</a>
        </nav>

        <div class="tab-content-wrapper">
            <div id="{{.Active}}-content" class="tab-content active">
                {{if eq .Active "about"}}
                {{.Content}}
                {{else}}
                <div class="content-container">
                    <div class="markdown-content">
                        {{.Content}}
                    </div>
                </div>
                {{end}}
            </div>
        </div>
    </div>

    <script src="js/index.js"></script>
    <script src="js/animation.js"></script>
</body>
</html>
