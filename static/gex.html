<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPX Gamma Exposure</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: #0d1117;
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 12px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
        }

        .separator {
            width: 1px;
            height: 20px;
            background: #30363d;
        }

        .timestamp {
            margin-left: auto;
            font-size: 12px;
            color: #8b949e;
        }

        /* Mobile menu button */
        #menu-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #21262d;
            color: #e6edf3;
            cursor: pointer;
            margin-left: auto;
        }

        #menu-btn:hover { background: #30363d; }

        /* Mobile dropdown menu */
        .mobile-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            padding: 12px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            z-index: 100;
            min-width: 200px;
            flex-direction: column;
            gap: 12px;
        }

        .mobile-menu.open { display: flex; }

        .mobile-menu .menu-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mobile-menu .menu-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .mobile-menu .timestamp {
            font-size: 11px;
            margin-left: 0;
            word-break: break-word;
        }

        /* Desktop controls wrapper */
        .desktop-controls {
            display: contents;
        }

        @media (max-width: 640px) {
            .container {
                padding: 8px;
                gap: 8px;
            }

            .top-bar {
                position: relative;
            }

            .desktop-controls {
                display: none;
            }

            #menu-btn {
                display: flex;
            }

            .chart-box {
                min-height: 300px;
            }
        }

        /* Mobile-only buttons in top bar */
        .mobile-only {
            display: none;
        }

        @media (max-width: 640px) {
            .mobile-only {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 32px;
                height: 32px;
                padding: 0;
                border: 1px solid #30363d;
                border-radius: 6px;
                background: #21262d;
                color: #e6edf3;
                cursor: pointer;
                transition: all 0.15s;
            }

            .mobile-only:hover { background: #30363d; border-color: #8b949e; }
            .mobile-only:disabled { background: #161b22; color: #484f58; cursor: not-allowed; border-color: #21262d; }
        }

        .tabs,
        .segmented {
            display: flex;
            border: 1px solid #30363d;
            border-radius: 6px;
            overflow: hidden;
        }

        .tabs { display: none; }
        .tabs:not(:empty) { display: flex; }

        .tab,
        .seg {
            padding: 5px 12px;
            border: none;
            background: #0d1117;
            color: #8b949e;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .tab:not(:last-child),
        .seg:not(:last-child) {
            border-right: 1px solid #30363d;
        }

        .tab:hover,
        .seg:hover { color: #e6edf3; }

        .tab.active,
        .seg.active { background: #1990ff; color: #fff; }

        #fetch-btn,
        #center-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #21262d;
            color: #e6edf3;
            cursor: pointer;
            transition: all 0.15s;
        }

        #fetch-btn:hover,
        #center-btn:hover { background: #30363d; border-color: #8b949e; }
        #fetch-btn:disabled { background: #161b22; color: #484f58; cursor: not-allowed; border-color: #21262d; }

        #content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .tab-content { display: none; }
        .tab-content.active {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chart-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }

        .chart-box {
            flex: 1;
            position: relative;
            min-height: 400px;
        }

        .chart-legend {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 14px;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 13px;
            backdrop-filter: blur(8px);
        }

        .chart-legend span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chart-legend .legend-labels {
            display: flex;
            gap: 12px;
        }

        .chart-legend .legend-values {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .chart-legend .legend-time {
            margin-left: 12px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .legend-dot.calls { background: #1990ff; }
        .legend-dot.puts { background: #ff0f3f; }

        .positive { color: #1990ff; }
        .negative { color: #ff0f3f; }
        .muted { color: #6a6d78; }

        @media (max-width: 640px) {
            .chart-legend {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
                padding: 8px 10px;
                padding-right: 36px;
                font-size: 11px;
                transition: transform 0.3s ease;
            }

            .chart-legend.collapsed {
                transform: translateX(calc(-100% + 20px));
            }

            .chart-legend .legend-values {
                margin-left: 0;
            }

            .chart-legend .legend-time {
                margin-left: 0;
                font-size: 10px;
            }

            .legend-toggle {
                display: flex;
                position: absolute;
                right: 8px;
                top: 50%;
                transform: translateY(-50%);
                width: 24px;
                height: 32px;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: #8b949e;
                transition: transform 0.3s ease;
            }

            .chart-legend.collapsed .legend-toggle {
                transform: translateY(-50%) rotate(180deg);
            }
        }

        @media (min-width: 641px) {
            .legend-toggle {
                display: none;
            }
        }

        .loading,
        .error {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b949e;
            font-size: 14px;
        }

        .error { color: #f85149; }

        .spinner {
            width: 48px;
            height: 48px;
            animation: rotate 1.4s linear infinite;
        }

        .spinner circle {
            stroke: #1990ff;
            stroke-linecap: round;
            animation: dash 1.4s ease-in-out infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        @keyframes dash {
            0%   { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
            50%  { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
            100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
        }

        .x-axis-marker {
            position: absolute;
            bottom: 5px;
            transform: translateX(-50%);
            background: #ffffff;
            color: #0d1117;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            z-index: 10;
            pointer-events: none;
        }
    </style>

<body>

<script>
const WORKER_URL = 'https://gex.v-agejevas.workers.dev';

class GEX {
    constructor(ticker, date) {
        this.ticker = ticker;
        this.date = date;
        this.currentPrice = null;
        this.timestamp = null;
        this.lastTradeTime = null;
        this.options = [];
        this.options0dte = [];
    }

    async init() {
        const quotes = await this.fetchQuotes();
        this.parseQuotes(quotes);
        this.calculateExposure();
        return this;
    }

    async fetchQuotes() {
        const res = await fetch(`${WORKER_URL}/${this.ticker}`);
        if (!res.ok) throw new Error(`Failed to fetch data (${res.status})`);
        return res.json();
    }

    parseQuotes(quotes) {
        const tkr = this.ticker.replace('_', '');

        this.currentPrice = quotes.data.current_price;
        this.timestamp = quotes.timestamp;
        this.lastTradeTime = quotes.data.options
            .map(o => o.last_trade_time)
            .filter(Boolean)
            .sort()
            .pop() || null;

        this.options = quotes.data.options.map(opt => ({
            ...opt,
            type: opt.option.match(/\d([CP])\d/)?.[1] || null,
            strike: parseInt(opt.option.match(/\d[CP](\d+)\d{3}/)?.[1]) || null
        }));

        this.options0dte = this.options.filter(opt =>
            opt.option.startsWith(`${tkr}W${this.date}`) ||
            opt.option.startsWith(`${tkr}${this.date}`)
        );
    }

    calculateExposure() {
        const calc = item => {
            const gamma = item.gamma || 0;
            const multiplier = 100 * this.currentPrice ** 2 * 0.01;
            const sign = item.type === 'P' ? -1 : 1;
            return {
                ...item,
                gex: gamma * (item.open_interest || 0) * multiplier * sign,
                vex: gamma * (item.volume || 0) * multiplier * sign
            };
        };

        this.options = this.options.map(calc);
        this.options0dte = this.options0dte.map(calc);
    }

    getByStrike(field, mode) {
        const lower = this.currentPrice * 0.92;
        const upper = this.currentPrice * 1.08;

        if (mode === 'net') {
            const net = {};
            for (const item of this.options0dte) {
                if (item.strike < lower || item.strike > upper) continue;
                net[item.strike] = (net[item.strike] || 0) + (item[field] || 0) / 1e9;
            }
            return {
                net: Object.entries(net)
                    .map(([strike, value]) => ({ strike: +strike, value }))
                    .sort((a, b) => a.strike - b.strike)
            };
        }

        const calls = {}, puts = {};
        for (const item of this.options0dte) {
            if (item.strike < lower || item.strike > upper) continue;
            const value = Math.abs(item[field] || 0) / 1e9;
            if (item.type === 'C') calls[item.strike] = (calls[item.strike] || 0) + value;
            if (item.type === 'P') puts[item.strike] = (puts[item.strike] || 0) + value;
        }

        const toArray = (obj, sign) => Object.entries(obj)
            .map(([strike, value]) => ({ strike: +strike, value: value * sign }))
            .sort((a, b) => a.strike - b.strike);

        return { calls: toArray(calls, 1), puts: toArray(puts, -1) };
    }

    getSummary(mode) {
        const price = this.currentPrice;

        if (mode === 'net') {
            const sum = (field, cond) => this.options0dte
                .filter(i => !cond || cond(i))
                .reduce((s, i) => s + (i[field] || 0), 0) / 1e9;

            return {
                gex0dte: {
                    total: sum('gex'),
                    below: sum('gex', i => i.strike < price),
                    above: sum('gex', i => i.strike >= price)
                },
                vex0dte: {
                    total: sum('vex'),
                    below: sum('vex', i => i.strike < price),
                    above: sum('vex', i => i.strike >= price)
                }
            };
        }

        const sumBy = (field, type) => this.options0dte
            .filter(i => i.type === type)
            .reduce((s, i) => s + Math.abs(i[field] || 0), 0) / 1e9;

        return {
            gex0dte: { calls: sumBy('gex', 'C'), puts: sumBy('gex', 'P') },
            vex0dte: { calls: sumBy('vex', 'C'), puts: sumBy('vex', 'P') }
        };
    }
}

class StrikeChart {
    constructor(container) {
        this.container = container;
        this.chart = null;
        this.strikes = [];
        this.strikeIdx = {};
        this.markerSeries = null;

        this.preserveLegend();
        this.setupResizeObserver();
    }

    preserveLegend() {
        this.legend = this.container.querySelector('.chart-legend');
        this.container.innerHTML = '';
        if (this.legend) this.container.appendChild(this.legend);
    }

    setupResizeObserver() {
        new ResizeObserver(() => {
            if (this.chart) {
                this.chart.applyOptions({
                    width: this.container.clientWidth,
                    height: this.container.clientHeight
                });
            }
        }).observe(this.container);
    }

    createChart() {
        this.chart = LightweightCharts.createChart(this.container, {
            layout: { background: { color: '#161b22' }, textColor: '#8b949e' },
            grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
            width: this.container.clientWidth,
            height: this.container.clientHeight || 640,
            rightPriceScale: { borderColor: '#30363d', scaleMargins: { top: 0.05, bottom: 0.05 } },
            timeScale: {
                borderColor: '#30363d',
                tickMarkFormatter: i => this.strikes[i]?.toString() || ''
            },
            localization: { timeFormatter: i => this.strikes[i]?.toString() || '' },
            crosshair: {
                horzLine: { color: '#8b949e', labelBackgroundColor: '#30363d' },
                vertLine: { color: '#8b949e', labelBackgroundColor: '#30363d', labelVisible: true }
            }
        });
    }

    buildStrikeIndex(data, mode) {
        const allData = mode === 'net' ? data.net : [...data.calls, ...data.puts];
        this.strikes = [...new Set(allData.map(d => d.strike))].sort((a, b) => a - b);
        this.strikeIdx = Object.fromEntries(this.strikes.map((s, i) => [s, i]));
        this.allData = allData;
    }

    setData(data, mode) {
        this.buildStrikeIndex(data, mode);
        this.createChart();
        mode === 'net' ? this.setNetData(data.net) : this.setCallsPutsData(data);
    }

    histogramOpts(color) {
        return {
            color,
            priceFormat: { type: 'custom', formatter: p => p.toFixed(2) + 'B' },
            priceScaleId: 'right',
            lastValueVisible: false
        };
    }

    setNetData(data) {
        this.markerSeries = this.chart.addHistogramSeries(this.histogramOpts());
        this.markerSeries.setData(data.map(d => ({
            time: this.strikeIdx[d.strike],
            value: d.value,
            color: d.value >= 0 ? '#1990ff' : '#ff0f3f'
        })));
    }

    setCallsPutsData(data) {
        const callSeries = this.chart.addHistogramSeries(this.histogramOpts('#1990ff'));
        const putSeries = this.chart.addHistogramSeries(this.histogramOpts('#ff0f3f'));

        callSeries.setData(data.calls.map(d => ({ time: this.strikeIdx[d.strike], value: d.value })));
        putSeries.setData(data.puts.map(d => ({ time: this.strikeIdx[d.strike], value: d.value })));

        this.markerSeries = callSeries;
    }

    centerOnStrike(strikeIdx) {
        const halfRange = 100;
        this.chart.timeScale().setVisibleLogicalRange({
            from: strikeIdx - halfRange,
            to: strikeIdx + halfRange
        });
    }

    addVerticalLine(strikeIdx) {
        const maxVal = Math.max(...this.allData.map(d => Math.abs(d.value)), 0.1);
        const lineExtent = maxVal * 100;

        const priceLine = this.chart.addLineSeries({
            color: '#ffffff',
            lineWidth: 1,
            lineStyle: 2,
            priceLineVisible: false,
            lastValueVisible: false,
            crosshairMarkerVisible: false,
            priceScaleId: 'right',
            autoscaleInfoProvider: () => ({
                priceRange: { minValue: -maxVal * 1.1, maxValue: maxVal * 1.1 }
            })
        });

        priceLine.setData([
            { time: strikeIdx, value: -lineExtent },
            { time: strikeIdx, value: lineExtent }
        ]);
    }

    addPriceMarker(price) {
        if (!price || !this.strikes.length) return;

        const closest = this.strikes.reduce((a, b) =>
            Math.abs(b - price) < Math.abs(a - price) ? b : a
        );
        const idx = this.strikeIdx[closest];
        this.priceStrikeIdx = idx;

        this.centerOnStrike(idx);
        this.addVerticalLine(idx);
        this.addXAxisLabel(idx, price);
    }

    addXAxisLabel(strikeIdx, price) {
        const label = document.createElement('div');
        label.className = 'x-axis-marker';
        label.textContent = price.toFixed(0);
        this.container.appendChild(label);

        const updatePosition = () => {
            const x = this.chart.timeScale().logicalToCoordinate(strikeIdx);
            if (x === null) {
                label.style.display = 'none';
            } else {
                label.style.display = 'block';
                label.style.left = x + 'px';
            }
        };

        requestAnimationFrame(updatePosition);
        this.chart.timeScale().subscribeVisibleLogicalRangeChange(updatePosition);
    }
}

function createChart(container, data, currentPrice, mode) {
    const chart = new StrikeChart(container);
    chart.setData(data, mode);
    chart.addPriceMarker(currentPrice);
    return chart;
}

function formatTimestamp(str, toLocal = false) {
    const date = new Date(str.replace(' ', 'T') + '-05:00');
    const formatted = date.toLocaleString('sv').replace('T', ' ');
    if (!toLocal) return formatted;

    const offset = -date.getTimezoneOffset();
    const h = Math.floor(Math.abs(offset) / 60);
    const m = Math.abs(offset) % 60;
    const tz = `UTC${offset >= 0 ? '+' : '-'}${h}${m ? ':' + String(m).padStart(2, '0') : ''}`;
    return `${formatted} ${tz}`;
}

function getTradingDay() {
    const d = new Date();
    if (d.getDay() === 0) d.setDate(d.getDate() + 1);
    if (d.getDay() === 6) d.setDate(d.getDate() + 2);
    return d.toISOString().slice(2, 10).replace(/-/g, '');
}

function getViewMode() {
    return document.querySelector('#view-mode .seg.active').dataset.value;
}

function renderDashboard(gex, mode) {
    const summary = gex.getSummary(mode);
    const fmt = n => (n >= 0 ? '+' : '') + n.toFixed(2);
    const cls = n => n >= 0 ? 'positive' : 'negative';
    const lastTrade = gex.lastTradeTime ? formatTimestamp(gex.lastTradeTime, true) : 'N/A';

    // Update both desktop and mobile tabs
    const tabsHtml = `
        <button class="tab active" data-tab="oi">OI</button>
        <button class="tab" data-tab="vol">Vol</button>
    `;
    document.getElementById('tabs').innerHTML = tabsHtml;
    document.getElementById('tabs-mobile').innerHTML = tabsHtml;

    // Update both timestamps
    const tsDesktop = `CBOE: ${gex.timestamp} ET | Local: ${formatTimestamp(gex.timestamp, true)}`;
    const tsMobile = formatTimestamp(gex.timestamp, true);
    document.getElementById('timestamp').textContent = tsDesktop;
    document.getElementById('timestamp-mobile').textContent = tsMobile;

    const toggleBtn = `<div class="legend-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div>`;

    const legend = data => mode === 'net'
        ? `<div class="chart-legend">
            <div class="legend-labels">
                <span><div class="legend-dot calls"></div> Positive</span>
                <span><div class="legend-dot puts"></div> Negative</span>
            </div>
            <div class="legend-values">
                <span class="${cls(data.total)}" style="font-weight:600">${fmt(data.total)}B</span>
                <span class="muted">(${fmt(data.below)} / ${fmt(data.above)})</span>
            </div>
            <span class="muted legend-time">Last: ${lastTrade}</span>
            ${toggleBtn}
           </div>`
        : `<div class="chart-legend">
            <div class="legend-labels">
                <span><div class="legend-dot calls"></div> Calls</span>
                <span><div class="legend-dot puts"></div> Puts</span>
            </div>
            <div class="legend-values">
                <span class="positive" style="font-weight:600">+${data.calls.toFixed(2)}B</span>
                <span class="negative" style="font-weight:600">-${data.puts.toFixed(2)}B</span>
            </div>
            <span class="muted legend-time">Last: ${lastTrade}</span>
            ${toggleBtn}
           </div>`;

    document.getElementById('content').innerHTML = `
        <div class="tab-content active" id="tab-oi">
            <div class="chart-container">
                <div class="chart-box" id="chart-oi">${legend(summary.gex0dte)}</div>
            </div>
        </div>
        <div class="tab-content" id="tab-vol">
            <div class="chart-container">
                <div class="chart-box" id="chart-vol">${legend(summary.vex0dte)}</div>
            </div>
        </div>
    `;

    const gexData = gex.getByStrike('gex', mode);
    const vexData = gex.getByStrike('vex', mode);

    activeCharts.oi = createChart(document.getElementById('chart-oi'), gexData, gex.currentPrice, mode);

    let volChartCreated = false;

    function switchTab(tabName) {
        // Sync both desktop and mobile tabs
        document.querySelectorAll('.tabs .tab').forEach(t => {
            t.classList.toggle('active', t.dataset.tab === tabName);
        });
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');

        if (tabName === 'vol' && !volChartCreated) {
            activeCharts.vol = createChart(document.getElementById('chart-vol'), vexData, gex.currentPrice, mode);
            volChartCreated = true;
        }
    }

    // Add listeners to both desktop and mobile tabs
    document.querySelectorAll('.tabs').forEach(tabsContainer => {
        tabsContainer.addEventListener('click', e => {
            const tab = e.target.closest('.tab');
            if (tab) switchTab(tab.dataset.tab);
        });
    });

    // Legend toggle for mobile
    document.querySelectorAll('.legend-toggle').forEach(toggle => {
        toggle.addEventListener('click', () => {
            toggle.closest('.chart-legend').classList.toggle('collapsed');
        });
    });
}

let currentGex = null;
let activeCharts = { oi: null, vol: null };

function recenterCharts() {
    if (!currentGex) return;
    Object.values(activeCharts).forEach(chart => {
        if (chart) chart.centerOnStrike(chart.priceStrikeIdx);
    });
}

async function fetchAndRender() {
    const btn = document.getElementById('fetch-btn');
    const btnMobile = document.getElementById('fetch-btn-mobile');
    const mode = getViewMode();

    document.getElementById('content').innerHTML = `
        <div class="loading">
            <svg class="spinner" viewBox="0 0 50 50">
                <circle cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle>
            </svg>
        </div>
    `;
    btn.disabled = true;
    btnMobile.disabled = true;

    try {
        currentGex = await new GEX('_SPX', getTradingDay()).init();
        renderDashboard(currentGex, mode);
    } catch (err) {
        document.getElementById('content').innerHTML = `<div class="error">Error: ${err.message}</div>`;
    } finally {
        btn.disabled = false;
        btnMobile.disabled = false;
    }
}

function onModeChange() {
    if (currentGex) {
        renderDashboard(currentGex, getViewMode());
    }
}

// Desktop controls
document.getElementById('fetch-btn').addEventListener('click', fetchAndRender);
document.getElementById('center-btn').addEventListener('click', recenterCharts);

// Mobile controls (in top bar)
document.getElementById('fetch-btn-mobile').addEventListener('click', fetchAndRender);
document.getElementById('center-btn-mobile').addEventListener('click', recenterCharts);

// Mobile menu toggle
document.getElementById('menu-btn').addEventListener('click', () => {
    document.getElementById('mobile-menu').classList.toggle('open');
});

// Close mobile menu when clicking outside
document.addEventListener('click', e => {
    const menu = document.getElementById('mobile-menu');
    const btn = document.getElementById('menu-btn');
    if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.remove('open');
    }
});

// View mode handlers (sync both desktop and mobile)
function handleViewModeClick(e) {
    const btn = e.target.closest('.seg');
    if (!btn) return;

    const value = btn.dataset.value;

    // Sync both desktop and mobile view mode buttons
    document.querySelectorAll('#view-mode .seg, #view-mode-mobile .seg').forEach(b => {
        b.classList.toggle('active', b.dataset.value === value);
    });

    onModeChange();
}

document.getElementById('view-mode').addEventListener('click', handleViewModeClick);
document.getElementById('view-mode-mobile').addEventListener('click', handleViewModeClick);

fetchAndRender();
</script>
